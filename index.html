<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIA 2.0: Clinical Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; color: #0f172a; margin: 0; padding: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .chart-container { position: relative; width: 100%; height: 260px; margin: auto; }
        #chat-window { height: 450px; overflow-y: auto; scroll-behavior: smooth; }
        .doctor-msg { border-left: 4px solid #ef4444; background: white; }
        .user-msg { border-right: 4px solid #334155; background: #1e293b; color: white; }
        .iron-protocol-active { background-color: #7f1d1d !important; color: white !important; }
    </style>
</head>
<body class="p-2 md:p-8">

<div class="max-w-4xl mx-auto">
    <header class="mb-4 border-b-2 border-slate-900 pb-2">
        <h1 class="text-4xl font-black uppercase italic text-slate-900">TAIA <span class="text-red-600">2.0</span></h1>
        <div class="bg-slate-900 text-white px-2 py-1 text-[10px] mono rounded inline-block mt-1">Пам'ять: Активна (Local)</div>
    </header>

    <div class="grid grid-cols-1 gap-4">
        <!-- Твій Стан -->
        <div class="bg-white border-2 border-slate-900 p-4 rounded shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
            <div class="chart-container">
                <canvas id="metricsChart"></canvas>
            </div>
            <div class="flex justify-around mt-2 text-[10px] mono font-bold uppercase">
                <div>Лінь: <span id="l-laziness">50%</span></div>
                <div>Пиздьож: <span id="l-delusion" class="text-red-600">50%</span></div>
            </div>
        </div>

        <!-- Чат -->
        <div class="flex flex-col bg-white border-2 border-slate-900 rounded shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] overflow-hidden">
            <div id="chat-window" class="p-4 space-y-4 bg-slate-50"></div>
            
            <div class="p-3 bg-slate-100 border-t border-slate-200">
                <div class="flex flex-wrap gap-2 mb-3">
                    <button onclick="qa('лінь')" class="text-[9px] font-bold uppercase bg-white border border-slate-400 px-2 py-1">Проїб</button>
                    <button onclick="qa('стосунки')" class="text-[9px] font-bold uppercase bg-white border border-slate-400 px-2 py-1">Стосунки</button>
                    <button onclick="qa('втомився')" class="text-[9px] font-bold uppercase bg-white border border-slate-400 px-2 py-1">Ниття</button>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="user-input" placeholder="Кажи..." class="flex-1 border-2 border-slate-900 p-2 text-sm focus:outline-none">
                    <button id="send-btn" class="bg-slate-900 text-white px-4 font-black uppercase text-xs">Аналіз</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Метрики
    let m = JSON.parse(localStorage.getItem('t2_m')) || { l: 50, d: 50, w: 50, v: 50, f: 50 };

    // Графік
    let chart;
    function initChart() {
        const c = document.getElementById('metricsChart').getContext('2d');
        chart = new Chart(c, {
            type: 'radar',
            data: {
                labels: ['ЛІНЬ', 'ПИЗДЬОЖ', 'НИТТЯ', 'ЖЕРТВА', 'СТРАХ'],
                datasets: [{
                    data: [m.l, m.d, m.w, m.v, m.f],
                    backgroundColor: 'rgba(239, 68, 68, 0.2)',
                    borderColor: '#ef4444',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { r: { min: 0, max: 100, ticks: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    function upUI() {
        if(chart) {
            chart.data.datasets[0].data = [m.l, m.d, m.w, m.v, m.f];
            chart.update();
        }
        document.getElementById('l-laziness').innerText = m.l + '%';
        document.getElementById('l-delusion').innerText = m.d + '%';
        localStorage.setItem('t2_m', JSON.stringify(m));
    }

    function msg(t, s) {
        const d = document.createElement('div');
        const isD = s === 'd';
        d.className = `flex ${isD ? 'justify-start' : 'justify-end'}`;
        d.innerHTML = `<div class="max-w-[90%] p-3 ${isD ? 'doctor-msg' : 'user-msg'} shadow-sm text-sm">
            <b class="text-[8px] uppercase block mb-1">${isD ? 'TAIA 2.0' : 'ТИ'}</b>${t}</div>`;
        const win = document.getElementById('chat-window');
        win.appendChild(d);
        win.scrollTop = win.scrollHeight;
    }

    function logic(i) {
        const v = i.toLowerCase();
        if (['суїцид', 'вбити себе'].some(x => v.includes(x))) {
            msg("Дзвони 7333. Зараз. Це не жарт.", 'd');
            return;
        }
        let r = "Я тебе не розумію. Спробуй не пиздіти і сказати щось по суті.";
        if (v.includes('лінь') || v.includes('потім')) { m.l = Math.min(100, m.l + 10); r = "Лінива дупа зафіксована. Твій прогрес пішов по пізді."; }
        else if (v.includes('стосунки') || v.includes('любов')) { m.d = Math.min(100, m.d + 15); r = "Стосунки? Ти просто шукаєш виправдання своєму мазохізму."; }
        else if (v.includes('втомився')) { m.w = Math.min(100, m.w + 10); r = "Втомився він... А я втомилася слухати твоє ниття. Роби справу."; }
        msg(r, 'd');
        upUI();
    }

    function send() {
        const i = document.getElementById('user-input');
        const val = i.value.trim();
        if(!val) return;
        msg(val, 'u');
        logic(val);
        i.value = '';
    }

    // Глобальна функція для кнопок
    window.qa = (t) => {
        const i = document.getElementById('user-input');
        i.value = t === 'лінь' ? "Я проїбав день." : t === 'стосунки' ? "В мене проблеми в стосунках." : "Я втомився.";
        send();
    };

    // Запуск
    document.addEventListener('DOMContentLoaded', () => {
        initChart();
        upUI();
        document.getElementById('send-btn').onclick = send;
        document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
        setTimeout(() => msg("Я тут. Кажи, що знову не так у твоєму жалюгідному житті?", 'd'), 500);
    });
</script>

</body>
</html>
