<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIA 2.0: Multi-Agent Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Segoe UI', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #chat-window { height: 600px; scrollbar-width: thin; scrollbar-color: #1e293b transparent; }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .agent-card { border-left: 4px solid #334155; transition: all 0.3s ease; }
        .agent-active { border-left-width: 8px; transform: translateX(5px); }
        
        /* Agent Styles */
        .taia-style { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .neuro-style { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .philo-style { border-color: #a855f7; background: rgba(168, 85, 247, 0.05); }
        .skeptic-style { border-color: #f97316; background: rgba(249, 115, 22, 0.05); }
        .exp-style { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .pattern-style { border-color: #06b6d4; background: rgba(6, 182, 212, 0.05); }
        .archive-style { border-color: #64748b; background: rgba(100, 116, 139, 0.05); }

        .btn-mode { border-bottom: 2px solid transparent; transition: all 0.2s; }
        .btn-active { border-color: #ef4444; color: #ef4444; font-weight: 900; }
    </style>
</head>
<body class="p-2 md:p-6">

<!-- Application Structure: Lab Ensemble based on user screenshots -->
<!-- Chosen Palette: Deep Night (Slate-950), Blood Red Accents (TAIA) -->

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-800 pb-4 gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-red-600 text-white font-black p-2 italic leading-none text-2xl">T2</div>
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter">TAIA <span class="text-red-600">Core</span></h1>
                <p class="text-[9px] mono text-slate-500 uppercase tracking-widest">Multi-Agent Neuro Lab & Therapy</p>
            </div>
        </div>
        <nav class="flex gap-8 text-xs font-black uppercase tracking-widest">
            <button id="nav-therapy" onclick="setMode('therapy')" class="btn-mode btn-active">Терапія</button>
            <button id="nav-lab" onclick="setMode('lab')" class="btn-mode">Лабораторія</button>
        </nav>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar -->
        <div class="lg:col-span-3 space-y-6">
            <div id="side-therapy" class="bg-slate-900/50 border border-slate-800 p-6 rounded-xl">
                <h3 class="text-xs font-black uppercase text-red-500 mb-6">Діагностика пацієнта</h3>
                <div class="h-48">
                    <canvas id="metricsChart"></canvas>
                </div>
                <div class="mt-4 space-y-2 text-[10px] mono">
                    <div class="flex justify-between border-b border-slate-800 pb-1"><span>Лінь</span> <span id="v-l">50%</span></div>
                    <div class="flex justify-between border-b border-slate-800 pb-1"><span>Самообман</span> <span id="v-d" class="text-red-500">50%</span></div>
                </div>
            </div>

            <div id="side-lab" class="hidden bg-slate-900/50 border border-slate-800 p-6 rounded-xl space-y-4">
                <h3 class="text-xs font-black uppercase text-blue-500 mb-4">Склад банди</h3>
                <div class="space-y-3 text-[11px] font-medium">
                    <div class="flex items-center gap-2 text-red-400"><span>🧠</span> <b>TAIA</b> (Директор)</div>
                    <div class="flex items-center gap-2 text-blue-400"><span>🔬</span> <b>NeuroScientist</b></div>
                    <div class="flex items-center gap-2 text-purple-400"><span>🧩</span> <b>Chaos Philosopher</b></div>
                    <div class="flex items-center gap-2 text-orange-400"><span>😈</span> <b>Ruthless Skeptic</b></div>
                    <div class="flex items-center gap-2 text-emerald-400"><span>🧪</span> <b>Experimentalist</b></div>
                    <div class="flex items-center gap-2 text-cyan-400"><span>📊</span> <b>Pattern Hunter</b></div>
                    <div class="flex items-center gap-2 text-slate-400"><span>📚</span> <b>Archivist</b></div>
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="lg:col-span-9 flex flex-col bg-slate-900/30 border border-slate-800 rounded-2xl overflow-hidden backdrop-blur-sm">
            <div id="chat-window" class="flex-1 p-6 overflow-y-auto space-y-6 bg-slate-950/20">
                <!-- Messages populated here -->
            </div>

            <div class="p-4 bg-slate-900/80 border-t border-slate-800">
                <div id="lab-tools" class="hidden flex gap-2 mb-4">
                    <button id="btn-next-round" onclick="runRound2()" class="hidden text-[10px] font-black uppercase bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500">
                        Debate Round 2 (Уточнити модель)
                    </button>
                    <div class="flex-1"></div>
                    <span id="lab-status" class="text-[9px] mono text-slate-500 uppercase self-center">Очікування теми...</span>
                </div>
                
                <div class="flex gap-3">
                    <input type="text" id="user-input" placeholder="Введіть проблему або тему дослідження..." 
                           class="flex-1 bg-slate-950 border border-slate-700 p-4 rounded-xl text-sm focus:outline-none focus:border-red-600 transition-all mono">
                    <button id="send-btn" class="bg-red-600 hover:bg-red-500 text-white px-8 rounded-xl font-black uppercase tracking-widest transition-all">
                        RUN
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let mode = 'therapy';
    let currentTopic = "";
    let stats = JSON.parse(localStorage.getItem('taia_global_stats')) || { l: 50, d: 50, w: 50, v: 50, f: 50 };
    let chart;

    // --- Core Logic ---
    function setMode(newMode) {
        mode = newMode;
        document.getElementById('nav-therapy').className = `btn-mode ${mode === 'therapy' ? 'btn-active' : ''}`;
        document.getElementById('nav-lab').className = `btn-mode ${mode === 'lab' ? 'btn-active' : ''}`;
        document.getElementById('side-therapy').classList.toggle('hidden', mode !== 'therapy');
        document.getElementById('side-lab').classList.toggle('hidden', mode !== 'lab');
        document.getElementById('lab-tools').classList.toggle('hidden', mode !== 'lab');
        
        clearChat();
        if(mode === 'therapy') {
            addMsg('taia', "Ти знову в кабінеті. Що на цей раз? Прокрастинація чи черговий напад самообману? Викладай.");
        } else {
            addMsg('taia', "Лабораторія в режимі очікування. Введіть тему (наприклад: 'Чи може prediction error стимулювати творчість?').");
        }
    }

    function initChart() {
        const ctx = document.getElementById('metricsChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['ЛІНЬ', 'ПИЗДЬОЖ', 'НИТТЯ', 'ЖЕРТВА', 'СТРАХ'],
                datasets: [{
                    data: [stats.l, stats.d, stats.w, stats.v, stats.f],
                    backgroundColor: 'rgba(239, 68, 68, 0.2)',
                    borderColor: '#ef4444',
                    borderWidth: 2,
                    pointBackgroundColor: '#ef4444'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { r: { grid: { color: '#1e293b' }, angleLines: { color: '#1e293b' }, min: 0, max: 100, ticks: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    function upUI() {
        if(chart) {
            chart.data.datasets[0].data = [stats.l, stats.d, stats.w, stats.v, stats.f];
            chart.update();
        }
        document.getElementById('v-l').innerText = stats.l + '%';
        document.getElementById('v-d').innerText = stats.d + '%';
        localStorage.setItem('taia_global_stats', JSON.stringify(stats));
    }

    function addMsg(agent, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        
        const configs = {
            taia: { title: "🧠 TAIA (Director)", style: "taia-style" },
            neuro: { title: "🔬 NeuroScientist", style: "neuro-style" },
            philo: { title: "🧩 Chaos Philosopher", style: "philo-style" },
            skeptic: { title: "😈 Ruthless Skeptic", style: "skeptic-style" },
            exp: { title: "🧪 Experimentalist", style: "exp-style" },
            pattern: { title: "📊 Pattern Hunter", style: "pattern-style" },
            archive: { title: "📚 Archivist", style: "archive-style" },
            user: { title: "PATIENT", style: "bg-slate-800 text-right self-end ml-auto" }
        };

        const config = configs[agent];
        div.className = `p-4 rounded-xl agent-card ${config.style} max-w-[90%]`;
        div.innerHTML = `
            <span class="text-[9px] font-black uppercase tracking-widest block mb-2 opacity-70">${config.title}</span>
            <div class="text-sm leading-relaxed">${text}</div>
        `;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function clearChat() { document.getElementById('chat-window').innerHTML = ''; }

    // --- Lab Flow ---
    async function runLab(topic) {
        currentTopic = topic;
        document.getElementById('lab-status').innerText = "Йде активна дискусія...";
        
        addMsg('neuro', `<b>Гіпотеза:</b> ${topic} пояснюється через механізми Predictive Coding. Коли мозок отримує сигнал, що не збігається з очікуванням, він оновлює модель.`);
        await sleep(1500);
        addMsg('philo', `<b>Радикальний погляд:</b> А що, якщо ${topic} — це не мінімізація, а контрольований <b>prediction error</b>? Мозок навмисно створює шум, щоб вийти за межі шаблону.`);
        await sleep(1500);
        addMsg('skeptic', `<b>Критика:</b> Тоді модель має показувати збільшення ентропії. Де ви бачите механізм контролю? Це звучить як нефальсифікована спекуляція.`);
        await sleep(1500);
        addMsg('exp', `<b>Експеримент:</b> Можна змонтувати через генеративну мережу (GAN). Ми введемо латентний шум і перевіримо, чи корелює це з "творчими" виходами моделі.`);
        await sleep(1500);
        addMsg('pattern', `<b>Pattern Hunter:</b> Схоже на баланс <i>exploration vs exploitation</i>. Ми бачимо цей патерн у поведінці при прийнятті рішень.`);
        await sleep(1500);
        addMsg('taia', `<b>Вердикт:</b> Ідея контрольованої помилки перспективна. Але Скептик правий — не вистачає нейронного субстрату. <br><b>Scientific Concern:</b> Як префронтальна кора виділяє ресурси на цей "шум"? <br>Статус: Потребує уточнення.`);
        await sleep(1000);
        addMsg('archive', `<b>Записую нову гіпотезу.</b> Тема: ${topic}. Стан: Round 1 complete.`);
        
        document.getElementById('btn-next-round').classList.remove('hidden');
        document.getElementById('lab-status').innerText = "Готовий до раунду 2";
    }

    async function runRound2() {
        document.getElementById('btn-next-round').classList.add('hidden');
        document.getElementById('lab-status').innerText = "Round 2: Еволюція ідей...";
        
        addMsg('taia', "<b>Debate Round 2:</b> Перегляньте аргументи Скептика. Уточніть модель.");
        await sleep(1000);
        addMsg('neuro', "<b>Уточнення:</b> Контроль помилки відбувається через модуляцію дофаміну в базальних гангліях. Це дає 'дозвіл' на ігнорування стандартних патернів.");
        await sleep(1500);
        addMsg('skeptic', "<b>Атака:</b> Тепер краще. Але як ми відрізнимо цей 'креативний шум' від психотичного розладу?");
        await sleep(1000);
        addMsg('archive', `<b>Еволюція моделі:</b> Додано дофамінергічний механізм. Статус: Active.`);
        document.getElementById('lab-status').innerText = "Цикл завершено";
    }

    // --- Interaction ---
    function send() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if(!val) return;

        addMsg('user', val);
        input.value = '';

        if(mode === 'therapy') {
            const v = val.toLowerCase();
            let res = "Твій пиздьож не змінює фактів. Працюй.";
            if(v.includes('лінь')) { stats.l = Math.min(100, stats.l + 10); res = "Твоя лінь — це просто страх провалу. Ти жалюгідний."; }
            else if(v.includes('стосунки')) { stats.d = Math.min(100, stats.d + 15); res = "Знову ідеалізуєш патологію? Твій самообман — твоя в'язниця."; }
            setTimeout(() => { addMsg('taia', res); upUI(); }, 600);
        } else {
            runLab(val);
        }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    document.getElementById('send-btn').onclick = send;
    document.getElementById('user-input').onkeypress = (e) => e.key === 'Enter' && send();

    window.onload = () => { initChart(); upUI(); setMode('therapy'); };
</script>

</body>
</html>
