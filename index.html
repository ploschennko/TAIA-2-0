<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIA Lab Core 4.5 | Autonomous Research Unit</title>
    <!-- Завантаження бібліотек через CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            background-color: #020617; 
            color: #f1f5f9; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Стилізація скролбару */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        /* Ефект сканування при автопілоті */
        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(1000%); }
        }
        .scanning-effect::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(59, 130, 246, 0.1), transparent);
            animation: scan-line 4s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        /* Анімація появи повідомлень */
        @keyframes msg-fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-node { animation: msg-fade-in 0.4s ease-out forwards; }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 10s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- Компонент іконок (SVG для стабільності) ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                send: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
                layers: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>,
                book: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>,
                download: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
                stop: <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><rect x="6" y="6" width="12" height="12"></rect></svg>,
                refresh: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
                terminal: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>,
                settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
                rocket: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3"></path><path d="M12 15v5s3.03-.55 5-2c2.2-1.62 3-5 3-5"></path></svg>,
                radar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93a10 10 0 0 0-14.14 0M16.24 7.76a6 6 0 0 0-8.48 0"></path><circle cx="12" cy="12" r="1"></circle><path d="M12 2v4"></path><path d="m16.24 16.24-2.83-2.83"></path><path d="M18 12h4"></path><path d="m4.93 19.07 2.83-2.83"></path><path d="M12 22v-4"></path><path d="m7.76 7.76 2.83 2.83"></path><path d="M6 12H2"></path><path d="m19.07 4.93-2.83 2.83"></path></svg>
            };
            return icons[name] || null;
        };

        const LS_KEYS = { TOPICS: 'taia_topics_final_v1', LOGS: 'taia_logs_final_v1', DRAFT: 'taia_draft_final_v1' };
        const generateId = () => `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;

        const App = () => {
            // --- Стан ---
            const [activeTab, setActiveTab] = useState('editor');
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem(LS_KEYS.LOGS) || '[]'));
            const [topics, setTopics] = useState(() => JSON.parse(localStorage.getItem(LS_KEYS.TOPICS) || '[]'));
            const [draftContent, setDraftContent] = useState(() => localStorage.getItem(LS_KEYS.DRAFT) || '# TAIA Laboratory Record\nFocus: Neural Mechanism Analysis');
            const [input, setInput] = useState('');
            const [isAutoPilot, setIsAutoPilot] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [currentStep, setCurrentStep] = useState(null);
            const [canEvolution, setCanEvolution] = useState(false);
            const [lastTopic, setLastTopic] = useState("");

            // --- Refs (Виправлено: додано відсутні refs) ---
            const chatEndRef = useRef(null);
            const editorRef = useRef(null);
            const inputRef = useRef(null);
            const abortRef = useRef(false);
            const mountedRef = useRef(true);
            const timeoutRef = useRef(null);

            // --- Налаштування Агентів ---
            const agentMeta = useMemo(() => ({
                curiosity: { name: '🛰️ Curiosity Agent', color: 'text-orange-400', border: 'border-orange-500/50', bg: 'bg-orange-500/10' },
                neuro: { name: '🔬 NeuroScientist', color: 'text-blue-400', border: 'border-blue-600/50', bg: 'bg-blue-500/5' },
                philo: { name: '🧩 Chaos Philosopher', color: 'text-purple-400', border: 'border-purple-600/50', bg: 'bg-purple-500/5' },
                skeptic: { name: '😈 Ruthless Skeptic', color: 'text-red-400', border: 'border-red-500/50', bg: 'bg-red-500/5' },
                exp: { name: '🧪 Experimentalist', color: 'text-emerald-400', border: 'border-emerald-600/50', bg: 'bg-emerald-500/5' },
                pattern: { name: '📊 Pattern Hunter', color: 'text-cyan-400', border: 'border-cyan-600/50', bg: 'bg-cyan-500/5' },
                taia: { name: '🧠 TAIA Director', color: 'text-red-500', border: 'border-red-600/50', bg: 'bg-red-600/5' },
                archive: { name: '📚 Archivist', color: 'text-slate-400', border: 'border-slate-500/50', bg: 'bg-slate-500/5' }
            }), []);

            // --- Життєвий цикл та збереження ---
            useEffect(() => {
                mountedRef.current = true;
                return () => { 
                    mountedRef.current = false;
                    if(timeoutRef.current) clearTimeout(timeoutRef.current);
                };
            }, []);

            useEffect(() => {
                localStorage.setItem(LS_KEYS.LOGS, JSON.stringify(logs));
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [logs]);

            useEffect(() => { localStorage.setItem(LS_KEYS.DRAFT, draftContent); }, [draftContent]);
            useEffect(() => { localStorage.setItem(LS_KEYS.TOPICS, JSON.stringify(topics)); }, [topics]);

            // --- Авто-ресайз (Повернуто для Ultimate UX) ---
            const autoResize = useCallback((el) => {
                if (!el) return;
                el.style.height = 'auto';
                el.style.height = `${Math.min(el.scrollHeight, 500)}px`;
            }, []);

            useEffect(() => autoResize(editorRef.current), [draftContent, activeTab, autoResize]);
            useEffect(() => autoResize(inputRef.current), [input, autoResize]);

            // --- Двигун досліджень ---
            const runResearch = async (topic = null, isEvolution = false) => {
                if (isProcessing && !isEvolution) return;
                setIsProcessing(true);
                abortRef.current = false;
                setCanEvolution(false);

                try {
                    let activeTopic = topic;

                    // 1. Етап Curiosity (якщо автопілот або тема не введена)
                    if (!activeTopic) {
                        setCurrentStep("Curiosity Analysis");
                        await new Promise(r => setTimeout(r, 1500));
                        const gaps = ["Синхронізація гамма-хвиль", "Ефект Зейгарнік у ШІ", "Мета-контроль дофаміну", "Ерозія синаптичних ваг", "Предиктивна ентропія"];
                        activeTopic = gaps[Math.floor(Math.random() * gaps.length)];
                        setLogs(prev => [...prev, { id: generateId(), agent: 'curiosity', content: `Виявлено прогалину в моделі. Тема: "${activeTopic}". Ініціюю штурм.` }]);
                    }
                    setLastTopic(activeTopic);

                    const responsePlan = isEvolution ? 
                        ['neuro', 'philo', 'skeptic', 'taia', 'archive'] : 
                        ['neuro', 'philo', 'skeptic', 'exp', 'pattern', 'taia', 'archive'];

                    const responses = {
                        neuro: isEvolution ? `Еволюція моделі: Механізм ${activeTopic} інтегрований у базальні ганглії для регуляції Prediction Error.` : `Гіпотеза: Феномен "${activeTopic}" регулюється через фронто-парієтальну мережу та ACC.`,
                        philo: isEvolution ? `Синтез: ${activeTopic} — це форма когнітивної ентропії, необхідної для виходу з локальних мінімумів.` : `Радикальна ідея: Можливо, ${activeTopic} — це не баг, а інструмент мозку для «зламу» застиглих моделей.`,
                        skeptic: isEvolution ? `Критика v2: Ваша оновлена модель все ще ігнорує індивідуальну варіативність нейронів.` : `Атака: У вашій теорії ${activeTopic} абсолютно бракує фальсифікованості та контрольної групи.`,
                        exp: `Методологія: Пропоную fMRI-дослідження з використанням контрастного стимулу для валідації гіпотези.`,
                        pattern: `Аналіз: Патерни ${activeTopic} корелюють із процесом навчання в генеративних нейронних мережах (GAN).`,
                        taia: isEvolution ? `Фінальний вердикт: Модель "${activeTopic}" v2.0 активована та готова до симуляції.` : `Резолюція: Гіпотеза "${activeTopic}" перспективна. Потрібен другий раунд для уточнення субстрату.`,
                        archive: `Дані зафіксовано. Дослідження "${activeTopic}" перенесено в основний реєстр.`
                    };

                    for (const id of responsePlan) {
                        if (abortRef.current || !mountedRef.current) break;
                        setCurrentStep(agentMeta[id].name);
                        await new Promise(r => { 
                            const delay = Math.random() * 500 + 1000;
                            timeoutRef.current = setTimeout(r, delay);
                        });
                        if (abortRef.current) break;
                        setLogs(prev => [...prev, { 
                            id: generateId(), 
                            agent: id, 
                            content: responses[id],
                            timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                        }].slice(-500));
                    }

                } finally {
                    if (mountedRef.current) {
                        setIsProcessing(false);
                        setCurrentStep(null);
                        if (!isEvolution && !abortRef.current) setCanEvolution(true);
                        // Циклічність автопілота
                        if (isAutoPilot && !abortRef.current) {
                            setTimeout(() => {
                                if (isAutoPilot && mountedRef.current) runResearch();
                            }, 5000);
                        }
                        inputRef.current?.focus();
                    }
                }
            };

            const handleManualRun = () => {
                if (!input.trim() || isProcessing) return;
                const val = input.trim();
                setLogs(prev => [...prev, { id: generateId(), agent: 'user', content: val }]);
                setInput('');
                runResearch(val);
            };

            const handleStop = () => {
                abortRef.current = true;
                if(timeoutRef.current) clearTimeout(timeoutRef.current);
                setIsProcessing(false);
                setCurrentStep(null);
                inputRef.current?.focus();
            };

            const exportData = () => {
                const data = { app: "TAIA Lab Core", v: "4.5.1", date: new Date().toISOString(), data: { draftContent, topics, logs } };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `TAIA_LAB_CORE_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="flex h-screen w-full bg-[#020617] text-slate-300 overflow-hidden">
                    {/* --- Sidebar (База тем) --- */}
                    <aside className="w-72 border-r border-slate-800 bg-slate-900/40 backdrop-blur-md flex flex-col shrink-0">
                        <div className="p-8 border-b border-slate-800">
                            <h1 className="text-2xl font-black tracking-tighter uppercase text-white flex items-center gap-3">
                                <span className="text-blue-500"><Icon name="layers" size={28} /></span> TAIA LAB
                            </h1>
                            <p className="text-[10px] mono text-slate-600 mt-2 uppercase tracking-[0.3em]">Autonomous Unit 4.5</p>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 space-y-10 custom-scrollbar">
                            <div className="space-y-4">
                                <button onClick={() => { 
                                            const nextState = !isAutoPilot;
                                            setIsAutoPilot(nextState); 
                                            if(nextState) runResearch(); 
                                        }} 
                                        className={`w-full py-4 rounded-[2rem] text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-3 shadow-2xl ${isAutoPilot ? 'bg-orange-600 text-white animate-pulse' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                                    <Icon name="radar" size={18} /> {isAutoPilot ? 'Auto-Pilot: ON' : 'Engage Auto-Pilot'}
                                </button>
                                <button onClick={() => setTopics(p => [{id: generateId(), title: 'Нова гіпотеза', date: new Date().toLocaleDateString()}, ...p])} 
                                        className="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-[2rem] text-[10px] font-black uppercase tracking-widest transition-all active:scale-95 shadow-lg">
                                    <Icon name="plus" size={14} className="inline mr-2" /> Створити тему
                                </button>
                            </div>

                            <nav className="space-y-6">
                                <div className="flex items-center gap-2 px-3 opacity-30"><Icon name="book" size={14} /><p className="text-[10px] font-black uppercase tracking-widest">Base Records</p></div>
                                {topics.length === 0 ? (
                                    <p className="text-[10px] px-3 opacity-20 italic">База тем порожня...</p>
                                ) : topics.map(t => (
                                    <div key={t.id} className="group p-4 bg-slate-900/50 border border-slate-800 rounded-2xl hover:border-blue-500/50 cursor-pointer transition-all relative overflow-hidden">
                                        <p className="text-xs font-bold text-slate-300 truncate pr-6">{t.title}</p>
                                        <p className="text-[9px] mono text-slate-600 mt-2">{t.date}</p>
                                        <button onClick={(e) => { e.stopPropagation(); if(confirm('Видалити цю тему?')) setTopics(p => p.filter(x => x.id !== t.id)); }} className="absolute right-4 top-4 opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 transition-all p-1"><Icon name="trash" size={14} /></button>
                                    </div>
                                ))}
                            </nav>
                        </div>
                        <div className="p-6 border-t border-slate-800 bg-slate-950/30">
                            <div className="flex items-center gap-4 text-[10px] font-black text-emerald-500 uppercase tracking-widest">
                                <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]" />
                                Core Synchronized
                            </div>
                        </div>
                    </aside>

                    {/* --- Main Area (Робочий простір) --- */}
                    <main className="flex-1 flex flex-col relative bg-[#020617]">
                        <header className="h-20 border-b border-slate-800 flex items-center px-12 justify-between backdrop-blur-xl z-20">
                            <div className="flex gap-12 h-full">
                                <button onClick={() => setActiveTab('editor')} className={`text-[11px] font-black uppercase tracking-[0.3em] relative py-2 transition-colors ${activeTab === 'editor' ? 'text-blue-400' : 'text-slate-600 hover:text-slate-400'}`}>
                                    Drafting Node
                                    {activeTab === 'editor' && <div className="absolute bottom-0 left-0 w-full h-1 bg-blue-500 shadow-[0_0_20px_#3b82f6]" />}
                                </button>
                                <button onClick={() => setActiveTab('preview')} className={`text-[11px] font-black uppercase tracking-[0.3em] relative py-2 transition-colors ${activeTab === 'preview' ? 'text-blue-400' : 'text-slate-600 hover:text-slate-400'}`}>
                                    Archive View
                                    {activeTab === 'preview' && <div className="absolute bottom-0 left-0 w-full h-1 bg-blue-500 shadow-[0_0_20px_#3b82f6]" />}
                                </button>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={exportData} title="Експорт результатів" className="p-3 text-slate-600 hover:text-blue-400 hover:bg-slate-900 rounded-2xl transition-all"><Icon name="download" size={20} /></button>
                                <button title="Налаштування" className="p-3 text-slate-600 hover:bg-slate-900 rounded-2xl transition-all"><Icon name="settings" size={20} /></button>
                            </div>
                        </header>

                        <div className="flex-1 flex overflow-hidden">
                            {/* Draft Editor */}
                            <section className="flex-1 p-12 overflow-y-auto custom-scrollbar bg-gradient-to-br from-slate-950/50 to-transparent">
                                <div className="max-w-3xl mx-auto h-full">
                                    {activeTab === 'editor' ? (
                                        <textarea ref={editorRef} value={draftContent} onChange={(e) => setDraftContent(e.target.value)} 
                                                className="w-full h-full bg-transparent outline-none resize-none font-mono text-sm leading-relaxed text-slate-500 focus:text-slate-200 transition-colors" 
                                                spellCheck={false} placeholder="// Initialize research data..." />
                                    ) : (
                                        <div className="p-12 bg-slate-900/10 border border-slate-800 rounded-[3rem] min-h-[600px] shadow-2xl backdrop-blur-sm relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-1 bg-blue-500/20 shadow-inner" />
                                            <pre className="text-xs font-mono whitespace-pre-wrap leading-relaxed text-slate-500 italic">{draftContent}</pre>
                                        </div>
                                    )}
                                </div>
                            </section>

                            {/* --- Deep Research Terminal --- */}
                            <section className={`w-[550px] border-l border-slate-800 bg-slate-950/40 flex flex-col shadow-2xl relative ${isAutoPilot ? 'scanning-effect' : ''}`}>
                                <div className="p-6 border-b border-slate-800 flex items-center justify-between bg-slate-900/50 backdrop-blur-md">
                                    <div className="flex items-center gap-3 text-blue-500">
                                        <Icon name="terminal" size={20} />
                                        <span className="text-[12px] font-black uppercase tracking-[0.3em]">Deep Research Logs</span>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        {isProcessing && <button onClick={handleStop} className="text-yellow-500 animate-pulse transition-colors p-1 hover:bg-yellow-900/20 rounded-lg"><Icon name="stop" size={18} /></button>}
                                        <button onClick={() => {if(confirm('Очистити всі логи дебатів?')) setLogs([]);}} className="text-slate-600 hover:text-red-500 transition-colors p-1 hover:bg-red-900/20 rounded-lg"><Icon name="trash" size={18} /></button>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto p-10 space-y-10 custom-scrollbar" role="log">
                                    {logs.length === 0 && (
                                        <div className="h-full flex flex-col items-center justify-center opacity-10 text-center grayscale">
                                            <Icon name="rocket" size={100} className="mb-8" />
                                            <p className="text-xs font-black uppercase tracking-[0.6em]">System Standby</p>
                                        </div>
                                    )}
                                    
                                    {logs.map(log => {
                                        const meta = agentMeta[log.agent];
                                        return (
                                            <div key={log.id} className={`flex flex-col msg-node ${log.agent === 'user' ? 'items-end' : 'items-start'}`}>
                                                {meta ? (
                                                    <div className={`w-full p-8 rounded-[2.5rem] border-l-8 bg-slate-900/60 shadow-xl transition-all hover:bg-slate-900/80 ${meta.border} ${meta.bg}`}>
                                                        <div className="flex justify-between items-center mb-5 border-b border-slate-800 pb-3">
                                                            <span className={`text-[11px] font-black uppercase tracking-[0.3em] ${meta.color}`}>{meta.name}</span>
                                                            <span className="text-[8px] mono text-slate-700">TIMESTAMP: {log.timestamp}</span>
                                                        </div>
                                                        <p className="text-[14px] leading-relaxed text-slate-300 font-medium selection:bg-blue-500/50">{log.content}</p>
                                                    </div>
                                                ) : (
                                                    <div className="bg-blue-600 text-white px-8 py-4 rounded-[2rem] rounded-tr-none text-[14px] font-black shadow-2xl shadow-blue-900/30 max-w-[90%] tracking-tight">
                                                        {log.content}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                    
                                    {isProcessing && (
                                        <div className="flex flex-col gap-6">
                                            <div className="flex gap-4 p-6 bg-blue-900/10 rounded-3xl border border-blue-500/30 w-fit shadow-2xl">
                                                <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce" />
                                                <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.2s]" />
                                                <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.4s]" />
                                            </div>
                                            <span className="text-[11px] mono text-blue-500 uppercase font-black px-2 tracking-[0.3em] animate-pulse">{currentStep} processing...</span>
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>

                                <div className="p-10 bg-slate-950/90 border-t border-slate-800 backdrop-blur-2xl">
                                    {canEvolution && !isProcessing && (
                                        <button onClick={() => runResearch(lastTopic, true)} 
                                                className="w-full mb-10 bg-gradient-to-r from-emerald-600 to-teal-700 text-white py-5 rounded-[2.5rem] text-[12px] font-black uppercase tracking-[0.4em] shadow-2xl shadow-emerald-900/40 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-4">
                                            <Icon name="refresh" size={20} className="animate-spin-slow" /> Debate Round 2: Evolution
                                        </button>
                                    )}
                                    <div className="relative group">
                                        <textarea ref={inputRef} value={input} onChange={(e) => setInput(e.target.value)} 
                                                  onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleManualRun())} 
                                                  placeholder="Manual Override: Введіть наукову проблему..." rows={1} 
                                                  className="w-full bg-slate-900 border-2 border-slate-800 focus:border-blue-600/50 rounded-[2.5rem] py-6 pl-10 pr-20 text-sm focus:outline-none transition-all resize-none overflow-hidden placeholder:text-slate-700 shadow-inner" 
                                                  aria-label="Поле вводу наукової проблеми" />
                                        <button onClick={handleManualRun} disabled={!input.trim() || isProcessing} 
                                                className="absolute right-5 bottom-4 p-4 bg-blue-600 text-white rounded-3xl hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/40 active:scale-90 disabled:opacity-20">
                                            <Icon name="send" size={24} />
                                        </button>
                                    </div>
                                    <p className="text-[10px] text-center mt-6 text-slate-700 font-black uppercase tracking-[0.5em] opacity-50">Deep Lab Infrastructure • v4.5.0-Final</p>
                                </div>
                            </section>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
